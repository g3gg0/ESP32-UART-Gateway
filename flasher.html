    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at 20% 20%, #1f2937 0%, #0b1220 40%, #070b15 75%);
            min-height: 100vh;
            padding: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #e5e7eb;
        }

        .container {
            max-width: 880px;
            width: 100%;
            background: linear-gradient(180deg, rgba(31, 41, 55, 0.9), rgba(15, 23, 42, 0.95));
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.55);
            overflow: hidden;
            border: 1px solid rgba(99, 102, 241, 0.35);
        }

        .header {
            background: linear-gradient(135deg, #0ea5e9 0%, #6366f1 45%, #8b5cf6 100%);
            color: white;
            padding: 32px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.1em;
            margin-bottom: 8px;
        }

        .header p {
            color: #e0f2fe;
        }

        .content {
            padding: 28px;
        }

        .section {
            margin-bottom: 22px;
        }

        .section h2 {
            color: #e5e7eb;
            margin-bottom: 14px;
            font-size: 1.2em;
            border-bottom: 2px solid rgba(99, 102, 241, 0.6);
            padding-bottom: 6px;
        }

        button {
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.25s ease;
            background: linear-gradient(135deg, #0ea5e9 0%, #6366f1 45%, #8b5cf6 100%);
            color: white;
            box-shadow: 0 10px 25px rgba(79, 70, 229, 0.35);
            margin-right: 10px;
            margin-bottom: 10px;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px) scale(1.01);
            box-shadow: 0 12px 28px rgba(79, 70, 229, 0.45);
        }

        button:disabled {
            background: #334155;
            cursor: not-allowed;
            box-shadow: none;
            color: #94a3b8;
        }

        .file-input-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 10px;
        }

        .file-input-wrapper input[type="file"] {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .file-input-label {
            display: inline-block;
            padding: 12px 24px;
            background: linear-gradient(135deg, #22d3ee 0%, #0ea5e9 50%, #6366f1 100%);
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.25s ease;
            box-shadow: 0 8px 20px rgba(34, 211, 238, 0.35);
        }

        .file-input-label:hover {
            transform: translateY(-2px) scale(1.01);
            box-shadow: 0 10px 26px rgba(34, 211, 238, 0.45);
        }

        .log-container {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 15px;

    <script>
        let flasher = null;
        let flashConfig = null;

        function isWebSerialSupported() {
            return typeof navigator !== 'undefined' && !!navigator.serial;
        }

        function getWebSerialUnsupportedMessage() {
            const ua = (typeof navigator !== 'undefined' && navigator.userAgent) ? navigator.userAgent : '';
            const isFirefox = /firefox/i.test(ua);
            if (isFirefox) {
                return 'WebSerial is not available in Firefox. Please use Microsoft Edge or Google Chrome to flash/configure this device.';
            }
            return 'WebSerial is not available in this browser. Please use Microsoft Edge or Google Chrome to flash/configure this device.';
        }

        function updateWebSerialUiState() {
            const supported = isWebSerialSupported();
            const msg = supported ? '' : getWebSerialUnsupportedMessage();

            const flashNotice = document.getElementById('webSerialNoticeFlash');
            const configNotice = document.getElementById('webSerialNoticeConfig');
            const connectBtn = document.getElementById('connectBtn');
            const cfgConnectBtn = document.getElementById('cfgConnectBtn');

            if (flashNotice) {
                flashNotice.textContent = msg;
                flashNotice.style.display = supported ? 'none' : 'block';
            }
            if (configNotice) {
                configNotice.textContent = msg;
                configNotice.style.display = supported ? 'none' : 'block';
            }

            if (connectBtn) {
                connectBtn.style.display = supported ? 'inline-block' : 'none';
            }
            if (cfgConnectBtn) {
                cfgConnectBtn.style.display = supported ? 'inline-block' : 'none';
            }

            return supported;
        }

        /* ============= Hexdump Logging Functions ============= */
        function hexdumpByte(b) {
            return b.toString(16).padStart(2, '0').toUpperCase();
        }

        function hexdumpRow(offset, data, maxLen = 16) {
            const hex = Array.from(data.slice(offset, Math.min(offset + maxLen, data.length)))
                .map(hexdumpByte)
                .join(' ');
            const ascii = Array.from(data.slice(offset, Math.min(offset + maxLen, data.length)))
                .map(b => (b >= 32 && b < 127) ? String.fromCharCode(b) : '.')
                .join('');
            const offsetStr = offset.toString(16).padStart(8, '0').toUpperCase();
            const hexPadded = hex.padEnd(48, ' ');
            return `${offsetStr}  ${hexPadded}  ${ascii}`;
        }

        function hexdump(label, data, maxBytes = 512) {
            if (!data || data.length === 0) {
                console.log(`${label}: [empty]`);
                return;
            }
            const actualLen = Math.min(data.length, maxBytes);
            const isLimited = data.length > maxBytes;
            console.log(`${label}: ${data.length} bytes${isLimited ? ` (showing first ${maxBytes})` : ''}`);
            for (let offset = 0; offset < actualLen; offset += 16) {
                console.log(hexdumpRow(offset, data, 16));
            }
            if (isLimited) {
                console.log(`... (${data.length - maxBytes} more bytes)`);
            }
        }

        function logPacketTX(label, packet) {
            if (!packet || packet.length === 0) {
                console.log(`TX ${label}: [empty packet]`);
                return;
            }
            const bytes = packet instanceof Uint8Array ? packet : new Uint8Array(packet);
            console.log(`%cTX ${label}`, 'color: #0ea5e9; font-weight: bold;', `(${bytes.length} bytes)`);
            hexdump('', bytes, 256);
        }

        function logPacketRX(label, packet) {
            if (!packet || packet.length === 0) {
                console.log(`RX ${label}: [empty packet]`);
                return;
            }
            const bytes = packet instanceof Uint8Array ? packet : new Uint8Array(packet);
            console.log(`%cRX ${label}`, 'color: #10b981; font-weight: bold;', `(${bytes.length} bytes)`);
            hexdump('', bytes, 256);
        }


        function getEmbeddedBinary(filename) {
            const b64 = EMBEDDED_BINARIES[filename];
            if (!b64) {
                throw new Error(`Embedded binary not found: ${filename}`);
            }
            const raw = atob(b64);
            const bytes = new Uint8Array(raw.length);
            for (let i = 0; i < raw.length; i++) {
                bytes[i] = raw.charCodeAt(i);
            }
            return bytes;
        }

        function log(message, type = 'info') {
            const logContainer = document.getElementById('logContainer');
            const timestamp = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            entry.textContent = `[${timestamp}] ${message}`;
            logContainer.appendChild(entry);
            logContainer.scrollTop = logContainer.scrollHeight;
        }

        function updateProgress(percent, text) {
            const progressBar = document.getElementById('progressBar');
            progressBar.style.width = percent + '%';
            progressBar.textContent = text || (percent + '%');
        }

        function applyFlashConfig(config, sourceLabel) {
            if (!config.files || !Array.isArray(config.files)) {
                throw new Error('Invalid JSON format: missing "files" array');
            }

            flashConfig = config;
            log(`Configuration loaded from ${sourceLabel}: ${flashConfig.files.length} file(s) to flash`, 'info');

            /* Display file list */
            const fileList = document.getElementById('fileList');
            fileList.innerHTML = '<strong>Files to flash:</strong>';
            flashConfig.files.forEach(item => {
                const div = document.createElement('div');
                div.className = 'file-item';
                let sizeInfo = '';
                if (EMBEDDED_BINARIES[item.file]) {
                    const b64 = EMBEDDED_BINARIES[item.file];
                    const bytes = Math.floor(b64.length * 3 / 4) - (b64.endsWith('==') ? 2 : b64.endsWith('=') ? 1 : 0);
                    sizeInfo = ` (${bytes} bytes)`;
                }
                else {
                    sizeInfo = ' (external file)';
                }

                div.innerHTML = `<code>${item.offset}</code> → ${item.file}${sizeInfo}`;
                fileList.appendChild(div);
            });
            fileList.style.display = 'block';

            const supported = updateWebSerialUiState();
            document.getElementById('connectBtn').disabled = !supported;
        }

        async function handleJsonSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            try {
                log('Reading JSON configuration...', 'info');
                const text = await file.text();
                const config = JSON.parse(text);
                applyFlashConfig(config, `file "${file.name}"`);
            } catch (error) {
                log(`Error reading JSON: ${error.message}`, 'error');
                flashConfig = null;
                document.getElementById('connectBtn').disabled = true;
            }
        }

        async function autoLoadConfig() {
            /* Built-in default configuration */
            const config = {
                files: [
                    { offset: '0x0', file: 'bootloader.bin' },
                    { offset: '0x8000', file: 'partition-table.bin' },
                    { offset: '0x10000', file: 'ESP32C3_UART.bin' }
                ]
            };

            try {
                applyFlashConfig(config, 'built-in default');
            } catch (error) {
                log(`Failed to apply default config: ${error.message}`, 'error');
            }
        }

        /* LOAD_BINARY_FILE_START */
        async function loadBinaryFile(filename) {
            if (EMBEDDED_BINARIES[filename]) {
                log(`Using embedded binary: ${filename}`, 'info');
                return getEmbeddedBinary(filename);
            }
            throw new Error(`Embedded binary not found: ${filename}`);
        }
        /* LOAD_BINARY_FILE_END */

        async function connectAndFlash() {
            if (!isWebSerialSupported()) {
                const msg = getWebSerialUnsupportedMessage();
                log(msg, 'error');
                const logSection = document.getElementById('logSection');
                if (logSection) logSection.style.display = 'block';
                return;
            }
            if (!flashConfig) {
                log('No configuration loaded', 'error');
                return;
            }

            try {
                document.getElementById('connectBtn').disabled = true;
                document.getElementById('disconnectBtn').disabled = false;
                document.querySelector('.progress-bar').style.display = 'block';

                // Create flasher instance
                log('Requesting serial port...', 'info');
                flasher = new ESPFlasher();
                flasher.logMessage = (msg) => log(msg, 'info');
                flasher.logError = (msg) => log(`[ERROR] ${msg}`, 'error');

                // Open port
                await flasher.openPort();
                log('Port opened successfully', 'info');

                // Reset to bootloader
                updateProgress(5, 'Resetting device...');
                await flasher.hardReset(true);
                log('Device reset to bootloader mode', 'info');

                // Sync with device
                updateProgress(10, 'Syncing...');
                await flasher.sync();
                log(`Device detected: ${flasher.current_chip}`, 'info');

                // Load stub for faster flashing
                updateProgress(15, 'Loading stub...');
                await flasher.downloadStub();
                log('Stub loader activated', 'info');

                // Flash each file
                const totalFiles = flashConfig.files.length;
                for (let i = 0; i < totalFiles; i++) {
                    const item = flashConfig.files[i];
                    const offset = parseInt(item.offset);

                    log(`Flashing ${item.file} at ${item.offset}...`, 'info');

                    // Load binary data
                    const data = await loadBinaryFile(item.file);
                    log(`Loaded ${data.length} bytes from ${item.file}`, 'info');

                    // Calculate progress range for this file
                    const baseProgress = 20 + (i * 70 / totalFiles);
                    const progressRange = 70 / totalFiles;

                    // Flash the data
                    await flasher.writeFlash(offset, data, (written, total, status) => {
                        const fileProgress = (written / total) * progressRange;
                        const totalProgress = baseProgress + fileProgress;
                        updateProgress(totalProgress, `${item.file}: ${Math.round((written / total) * 100)}%`);
                    });

                    log(`✓ ${item.file} flashed successfully`, 'info');
                }

                updateProgress(95, 'Resetting to application...');
                await flasher.hardReset(false);

                updateProgress(100, 'Complete!');
                log('All files flashed successfully! Device is rebooting.', 'info');

                // Flash green background on entire page
                const body = document.body;
                body.style.transition = 'background 0.5s ease';
                body.style.background = 'radial-gradient(circle at 20% 20%, #27ae60 0%, #1e8449 40%, #145a32 75%)';
                console.log('Setting green background');

                setTimeout(() => {
                    body.style.background = 'radial-gradient(circle at 20% 20%, #1f2937 0%, #0b1220 40%, #070b15 75%)';
                    console.log('Fading back to original background');
                    setTimeout(() => {
                        body.style.transition = '';
                        body.style.background = '';
                    }, 500);
                }, 1000);

                // Auto disconnect after a few seconds
                setTimeout(async () => {
                    await disconnect();
                }, 2000);

            } catch (error) {
                log(`Flashing failed: ${error.message}`, 'error');
                document.getElementById('logSection').style.display = 'block';
                updateProgress(0, 'Failed');
                document.querySelector('.progress-bar').style.display = 'none';
                document.getElementById('connectBtn').disabled = !isWebSerialSupported();
                document.getElementById('disconnectBtn').disabled = true;
            }
        }

        async function disconnect() {
            if (flasher) {
                try {
                    await flasher.disconnect();
                    log('Disconnected', 'info');
                } catch (error) {
                    log(`Disconnect error: ${error.message}`, 'error');
                }
                flasher = null;
            }
            document.getElementById('connectBtn').disabled = !isWebSerialSupported() ? true : (flashConfig ? false : true);
            document.getElementById('disconnectBtn').disabled = true;
            document.querySelector('.progress-bar').style.display = 'none';
            document.getElementById('logSection').style.display = 'none';
            updateProgress(0, '0%');
        }

        /* ------------ Tab + Config tool ------------ */
        function setActiveTool(tool) {
            const flashPane = document.getElementById('flashTool');
            const configPane = document.getElementById('configTool');
            const flashBtn = document.getElementById('flashTabBtn');
            const configBtn = document.getElementById('configTabBtn');

            if (tool === 'config') {
                flashPane.classList.add('hidden');
                configPane.classList.remove('hidden');
                flashBtn.classList.remove('active');
                configBtn.classList.add('active');
            }
            else {
                configPane.classList.add('hidden');
                flashPane.classList.remove('hidden');
                configBtn.classList.remove('active');
                flashBtn.classList.add('active');
            }
        }

        /* Config tool state */
        let cfgSerial = null;
        let cfgLastSentConfig = null;

        function logToConsole(message, type = 'info') {
            const mapped = type === 'error' ? 'error' : 'info';
            log(message, mapped);
        }

        function consoleLogHex(prefix, data) {
            if (!data) return;
            const bytes = data instanceof Uint8Array ? data : new Uint8Array(data);
            console.log(`${prefix} [${bytes.length} bytes]`);
        }

        function hexdump(buffer) {
            let output = '';
            for (let i = 0; i < buffer.length; i += 16) {
                const chunk = buffer.slice(i, Math.min(i + 16, buffer.length));
                let hex = '';
                let ascii = '';

                for (let j = 0; j < 16; j++) {
                    if (j < chunk.length) {
                        const byte = chunk[j];
                        hex += byte.toString(16).padStart(2, '0').toUpperCase() + ' ';
                        ascii += (byte >= 32 && byte <= 126) ? String.fromCharCode(byte) : '.';
                    } else {
                        hex += '   ';
                        ascii += ' ';
                    }
                    if (j === 7) hex += ' ';
                }

                output += `${i.toString(16).padStart(8, '0')}:  ${hex} | ${ascii}\n`;
            }
            return output;
        }

        function cfgUpdateStatus(message, isError = false, isSuccess = false) {
            const statusBox = document.getElementById('cfgStatusBox');
            const statusText = document.getElementById('cfgStatusText');

            if (!message) {
                statusBox.style.display = 'none';
                statusText.textContent = '';
                return;
            }

            statusBox.style.display = 'block';
            statusText.textContent = message;
            statusBox.classList.remove('error', 'success');
            if (isError) statusBox.classList.add('error');
            if (isSuccess) statusBox.classList.add('success');
        }

        function cfgNormalizeConfig(config) {
            if (!config) return null;
            return {
                baudRate: config.baud_rate ?? 0,
                txGpio: config.tx_gpio ?? 0,
                rxGpio: config.rx_gpio ?? 0,
                resetGpio: config.reset_gpio ?? 0,
                controlGpio: config.control_gpio ?? 0,
                ledGpio: config.led_gpio ?? 0
            };
        }

        function cfgUpdateReceived(config) {
            const elem = document.getElementById('cfgReceivedConfigText');
            const box = document.getElementById('cfgReceivedConfigBox');

            const normalized = cfgNormalizeConfig(config);

            if (normalized) {
                box.style.display = 'block';
                const matches = cfgLastSentConfig &&
                    normalized.baudRate === cfgLastSentConfig.baudRate &&
                    normalized.txGpio === cfgLastSentConfig.txGpio &&
                    normalized.rxGpio === cfgLastSentConfig.rxGpio &&
                    normalized.resetGpio === cfgLastSentConfig.resetGpio &&
                    normalized.controlGpio === cfgLastSentConfig.controlGpio &&
                    normalized.ledGpio === cfgLastSentConfig.ledGpio;

                if (matches) {
                    const resetName = normalized.resetGpio === 255 ? 'Unused' : `GPIO${normalized.resetGpio}`;
                    const controlName = normalized.controlGpio === 255 ? 'Unused' : `GPIO${normalized.controlGpio}`;
                    const ledName = normalized.ledGpio === 255 ? 'Unused' : `GPIO${normalized.ledGpio}`;
                    elem.innerHTML = `<div style="text-align: center; font-size: 48px; color: #27ae60;">✓</div>
                        <div style="text-align: center; margin-top: 10px;">Configuration Applied Successfully</div>
                        <div style="text-align: center; font-size: 11px; margin-top: 8px;">Baud: ${normalized.baudRate} bps | TX: GPIO${normalized.txGpio} | RX: GPIO${normalized.rxGpio}<br>Reset: ${resetName} | Control: ${controlName} | LED: ${ledName}</div>`;
                    box.style.borderLeftColor = '#27ae60';
                    box.style.background = '#e6ffe6';
                    box.style.color = '#27ae60';
                    box.style.transition = 'opacity 0.5s ease-out';
                    box.style.opacity = '1';

                    // Fade out after 4 seconds
                    setTimeout(() => {
                        box.style.opacity = '0';
                        setTimeout(() => {
                            elem.innerHTML = '';
                            box.style.borderLeftColor = '';
                            box.style.background = '';
                            box.style.color = '';
                        }, 500); // Wait for fade out animation to complete
                    }, 4000);
                }
                else if (!cfgLastSentConfig) {
                    const resetName = normalized.resetGpio === 255 ? 'Unused' : `GPIO${normalized.resetGpio}`;
                    const controlName = normalized.controlGpio === 255 ? 'Unused' : `GPIO${normalized.controlGpio}`;
                    const ledName = normalized.ledGpio === 255 ? 'Unused' : `GPIO${normalized.ledGpio}`;
                    elem.innerHTML = `
                        <div style="text-align: center; font-weight: bold; margin-bottom: 8px;">Current Device Config</div>
                        <div style="font-size: 12px; text-align: center;">
                            Baud: ${normalized.baudRate} bps<br>
                            TX: GPIO${normalized.txGpio} | RX: GPIO${normalized.rxGpio}<br>
                            Reset: ${resetName} | Control: ${controlName}<br>
                            LED: ${ledName}
                        </div>
                    `;
                    box.style.borderLeftColor = '#2196F3';
                    box.style.background = '#e3f2fd';
                    box.style.color = '#1565c0';

                    document.getElementById('cfgBaudRate').value = normalized.baudRate;
                    document.getElementById('cfgTxGpio').value = normalized.txGpio;
                    document.getElementById('cfgRxGpio').value = normalized.rxGpio;
                    document.getElementById('cfgResetGpio').value = normalized.resetGpio;
                    document.getElementById('cfgControlGpio').value = normalized.controlGpio;
                    document.getElementById('cfgLedGpio').value = normalized.ledGpio;

                    /* Show config section now that we have a valid config */
                    document.getElementById('cfgConfigSection').style.display = 'block';
                    document.getElementById('cfgActionsSection').style.display = 'block';

                }
                else {
                    const resetName = normalized.resetGpio === 255 ? 'Unused' : `GPIO${normalized.resetGpio}`;
                    const controlName = normalized.controlGpio === 255 ? 'Unused' : `GPIO${normalized.controlGpio}`;
                    const ledName = normalized.ledGpio === 255 ? 'Unused' : `GPIO${normalized.ledGpio}`;
                    elem.innerHTML = `
                        <div style="text-align: center; font-weight: bold; margin-bottom: 8px;">Device Config Received</div>
                        <div style="font-size: 12px; text-align: center;">
                            Baud: ${normalized.baudRate} bps<br>
                            TX: GPIO${normalized.txGpio} | RX: GPIO${normalized.rxGpio}<br>
                            Reset: ${resetName} | Control: ${controlName}<br>
                            LED: ${ledName}
                        </div>
                    `;
                    box.style.borderLeftColor = '#2196F3';
                    box.style.background = '#e3f2fd';
                    box.style.color = '#1565c0';
                }
            }
            else {
                elem.textContent = 'Invalid configuration packet received';
                box.style.borderLeftColor = '#e74c3c';
                box.style.background = '#ffe6e6';
                box.style.color = '#c0392b';
            }
        }

        function cfgHandleDisconnect(reason) {
            cfgSerial = null;
            document.getElementById('cfgConnectBtn').disabled = false;
            document.getElementById('cfgDisconnectBtn').disabled = true;
            document.getElementById('cfgSendBtn').disabled = true;
            document.getElementById('cfgConfigSection').style.display = 'none';
            document.getElementById('cfgActionsSection').style.display = 'none';
            document.getElementById('cfgConnectBtn').style.display = 'block';
            document.getElementById('cfgDisconnectBtn').style.display = 'none';
            if (reason) {
                cfgUpdateStatus(`Disconnected (${reason})`, true);
            } else {
                cfgUpdateStatus('Disconnected', true);
            }
        }

        async function cfgConnectDevice() {
            try {
                if (!isWebSerialSupported()) {
                    cfgUpdateStatus(getWebSerialUnsupportedMessage(), true);
                    return;
                }
                cfgSerial = new EspSerial();
                cfgSerial.setConfigCallback((packet) => {
                    cfgUpdateStatus(null);
                    cfgUpdateReceived(packet);
                });

                cfgSerial.setLogCallback((msg) => { cfgUpdateStatus(msg.text, false); });
                cfgSerial.setDataCallback(() => { });
                cfgSerial.setDisconnectCallback((info) => {
                    const reason = info && info.reason ? info.reason : 'port closed';
                    cfgHandleDisconnect(reason);
                });

                const connected = await cfgSerial.connect();
                if (!connected) {
                    throw new Error('Connection cancelled');
                }

                document.getElementById('cfgConnectBtn').disabled = true;
                document.getElementById('cfgDisconnectBtn').disabled = false;
                document.getElementById('cfgSendBtn').disabled = false;
                document.getElementById('cfgConnectBtn').style.display = 'none';
                document.getElementById('cfgDisconnectBtn').style.display = 'block';

                cfgLastSentConfig = null;
                await cfgSerial.requestConfig();
            } catch (err) {
                cfgUpdateStatus('Connection failed: ' + err.message, true);
            }
        }

        async function cfgDisconnectDevice() {
            try {
                if (cfgSerial) {
                    await cfgSerial.disconnect();
                }
                cfgHandleDisconnect('manual');
            } catch (err) {
                cfgUpdateStatus('Disconnect error: ' + err.message, true);
            }
        }

        async function cfgSendConfig() {
            if (!cfgSerial) {
                return;
            }

            const baudRate = parseInt(document.getElementById('cfgBaudRate').value);
            const txGpio = parseInt(document.getElementById('cfgTxGpio').value);
            const rxGpio = parseInt(document.getElementById('cfgRxGpio').value);
            const resetGpio = parseInt(document.getElementById('cfgResetGpio').value);
            const controlGpio = parseInt(document.getElementById('cfgControlGpio').value);
            const ledGpio = parseInt(document.getElementById('cfgLedGpio').value);

            if (txGpio === rxGpio) {
                cfgUpdateStatus('TX and RX GPIO must be different', true);
                return;
            }

            cfgLastSentConfig = { baudRate, txGpio, rxGpio, resetGpio, controlGpio, ledGpio };

            try {
                await cfgSerial.setConfig({
                    baud_rate: baudRate,
                    tx_gpio: txGpio,
                    rx_gpio: rxGpio,
                    reset_gpio: resetGpio,
                    control_gpio: controlGpio,
                    led_gpio: ledGpio,
                    extended_mode: 1
                });
            } catch (err) {
                cfgUpdateStatus('Send failed: ' + err.message, true);
            }
        }

        window.onload = () => {
            log('ESP32-C3 UART Gateway Flasher ready', 'info');
            log('Loading built-in default configuration...', 'info');
            updateWebSerialUiState();
            autoLoadConfig();
            setActiveTool('flash');
        };
    </script>
</body>
